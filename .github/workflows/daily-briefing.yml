name: Daily Pre-Market Briefing

# Runs every day at 06:30 UTC = 12:00 PM IST.
# Fully wired up — pulls live BTC/ETH/SOL/PAXG data, sentiment, and headlines,
# writes a new blog post, updates the blog archive, and updates the homepage
# preview card. Commits and pushes automatically. No manual step required.
#
# Optional: add an ANTHROPIC_API_KEY repo secret (Settings → Secrets and
# variables → Actions) to have Claude write the narrative prose in the site's
# house style. Without it, the script still runs fine — it just falls back
# to a plain, data-only version of the post instead of AI-written prose.

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab to test

permissions:
  contents: write

jobs:
  publish-briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_briefing.py

      - name: Commit and push new post
        run: |
          git config user.name "bkq-bot"
          git config user.email "actions@users.noreply.github.com"
          git add blog/ index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto: pre-market briefing $(date -u +%Y-%m-%d)"
          git push
